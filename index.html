<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header id="header">
    <div class="header-inner">
      <h1 class="site-title">Somewhere I've Been</h1><!-- ✏️ Change this -->
      <div class="header-stats">
        <span id="stat-countries"></span>
        <span class="sep">·</span>
        <span id="stat-cities"></span>
      </div>
    </div>
  </header>

  <!-- ── MAP ── -->
  <div id="map"></div>

  <!-- ── SCROLLABLE CONTENT ── -->
  <main id="content">

    <!-- Country filter pills -->
    <div id="filter-bar">
      <button class="filter-btn active" data-country="all">
        <span class="filter-flag">🌍</span>
        <span class="filter-label">All</span>
      </button>
      <!-- More buttons injected by app.js -->
    </div>

    <!-- List of cities, newest first -->
    <div id="city-list"></div>

  </main>

  <!-- ── DETAIL PANEL ── -->
  <div id="panel-overlay"></div>
  <aside id="panel" class="panel-hidden">
    <button id="panel-close" aria-label="Close">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="1" y1="1" x2="12" y2="12"/><line x1="12" y1="1" x2="1" y2="12"/>
      </svg>
    </button>
    <div id="panel-inner"></div>
  </aside>

  <!-- ── LIGHTBOX ── -->
  <div id="lightbox" class="lightbox-hidden">
    <div id="lb-backdrop"></div>
    <div id="lb-content">
      <button id="lb-close">✕</button>
      <button id="lb-prev">←</button>
      <button id="lb-next">→</button>
      <img id="lb-img" src="" alt="" />
      <p id="lb-caption"></p>
      <p id="lb-counter"></p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
