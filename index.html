<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Travel Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════
       VIEW 1 — MAIN PAGE (map + list)
  ══════════════════════════════════ -->
  <div id="view-main">

    <header id="header">
      <div class="header-inner">
        <h1 class="site-title">Somewhere I've Been</h1> <!-- ✏️ Change title -->
        <div class="header-stats">
          <span id="stat-countries"></span>
          <span class="sep">·</span>
          <span id="stat-cities"></span>
        </div>
      </div>
    </header>

    <div id="map"></div>

    <main id="content">
      <div id="filter-bar">
        <button class="filter-btn active" data-country="all">
          <span class="filter-flag">🌍</span>
          <span class="filter-label">All</span>
        </button>
      </div>
      <div id="city-list"></div>
    </main>

  </div>


  <!-- ══════════════════════════════════
       VIEW 2 — CITY DETAIL PAGE
  ══════════════════════════════════ -->
  <div id="view-city" class="hidden">

    <header id="city-header">
      <div class="header-inner">
        <button id="back-btn" onclick="goBack()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="10 3 5 8 10 13"/>
          </svg>
          Back
        </button>
        <span id="city-header-name"></span>
      </div>
    </header>

    <article id="city-page">
      <div id="city-page-inner">

        <!-- City title -->
        <div id="city-title-block">
          <h1 id="city-page-name"></h1>
          <p id="city-page-dates"></p>
        </div>

        <!-- Small map for this city -->
        <div id="city-map"></div>

        <!-- Notes -->
        <div id="city-notes-block">
          <p id="city-notes"></p>
        </div>

        <!-- Photos — full width, stacked -->
        <div id="city-photos"></div>

      </div>
    </article>

  </div>


  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox-hidden">
    <div id="lb-backdrop"></div>
    <div id="lb-content">
      <button id="lb-close">✕</button>
      <button id="lb-prev">←</button>
      <button id="lb-next">→</button>
      <img id="lb-img" src="" alt="" />
      <p id="lb-caption"></p>
      <p id="lb-counter"></p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
